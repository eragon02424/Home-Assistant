name: "MCP Grafana"
description: "Official Grafana MCP Server for AI assistant integration via Model Context Protocol."
version: "1.3.3"
slug: "grafana_mcp"
init: false
arch:
  - aarch64
  - amd64
startup: services
boot: auto
map:
  - config:rw
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "MCP Grafana (StreamableHTTP)"
options:
  grafana_url: "http://localhost:3000"
  grafana_token: ""
schema:
  grafana_url: str
  grafana_token: str
