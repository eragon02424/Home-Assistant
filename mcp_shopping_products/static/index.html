<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shopping Scan</title>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
<style>
  body { font-family: sans-serif; background:#111; color:#eee; margin:0; padding:16px; }
  h2 { margin-top:0; }
  .step { display:none; }
  .step.active { display:block; }
  button { font-size:1.2em; padding:12px 20px; margin:8px 0; width:100%; border-radius:8px; border:none; background:#2a6; color:#fff; }
  button.secondary { background:#446; }
  input[type=number] { font-size:1.2em; padding:10px; width:100%; box-sizing:border-box; margin:8px 0; }
  #status { margin:12px 0; padding:10px; border-radius:8px; min-height:1.2em; }
  .ok { background:#264; }
  .err { background:#622; }
  label { display:block; margin-top:12px; }
  video { width:100%; border-radius:8px; background:#000; }
  #barcodeLabel, #productName { font-size:1.3em; margin:8px 0; }
  #productPic { max-width:100%; border-radius:8px; margin:8px 0; display:none; }
</style>
</head>
<body>

<h2>Grocy Schnellscan</h2>
<div id="status"></div>

<div id="step-video" class="step active">
  <video id="livestream" muted playsinline></video>
</div>

<div id="step-action" class="step">
  <p id="barcodeLabel"></p>
  <p id="productName"></p>
  <img id="productPic">
  <label>Menge</label>
  <input type="number" id="amount" value="1" step="1" min="0.01">
  <button id="btnAdd">Einlagern</button>
  <button id="btnConsume" class="secondary">Auslagern</button>
  <button id="btnCancel" class="secondary">Abbrechen (neu scannen)</button>
</div>

<div id="step-photo2" class="step">
  <p id="unknownLabel"></p>
  <p>Bitte Kamera auf die Produkt-Vorderseite richten und auf "Foto aufnehmen" tippen.</p>
  <video id="livestream2" muted playsinline></video>
  <button id="btnCapture">Foto aufnehmen &amp; Produkt anlegen</button>
</div>

<canvas id="captureCanvas" style="display:none;"></canvas>

<script>
// WICHTIG: alle eigenen API-Pfade unten sind dokumentrelativ (kein fuehrender
// "/"), z.B. "api/check-barcode" statt "/api/check-barcode". Root-relative
// Pfade werden innerhalb des HA-Ingress-iframes gegen die Nabu-Casa-Domain
// aufgeloest statt gegen den tatsaechlichen Ingress-Pfad dieses Add-ons -
// exakt derselbe Fehler, den wir vorher bei Grocys eigenen Asset-Links
// gefunden und behoben haben.

const hints = new Map();
hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
  ZXing.BarcodeFormat.EAN_8,
  ZXing.BarcodeFormat.EAN_13,
  ZXing.BarcodeFormat.CODE_39,
  ZXing.BarcodeFormat.CODE_128,
  ZXing.BarcodeFormat.QR_CODE,
]);
const reader = new ZXing.BrowserMultiFormatReader(hints);

let pendingBarcode = null;

function showStep(id) {
  document.querySelectorAll('.step').forEach(e => e.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showStatus(msg, ok) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = ok ? 'ok' : 'err';
}

function startScanning() {
  showStep('step-video');
  showStatus('Suche Barcode...', true);
  reader.decodeFromVideoDevice(undefined, 'livestream', (result, error) => {
    if (result) {
      reader.reset();
      pendingBarcode = result.getText();
      document.getElementById('barcodeLabel').textContent = 'Barcode: ' + pendingBarcode;
      checkBarcode();
    }
  }).catch(err => showStatus('Kamera-Fehler: ' + err, false));
}

async function checkBarcode() {
  showStatus('Gleiche mit Grocy ab...', true);
  try {
    const res = await fetch('api/check-barcode', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ barcode: pendingBarcode })
    });
    if (!res.ok) {
      showStatus('Server-Fehler (' + res.status + ')', false);
      return;
    }
    const data = await res.json();

    if (data.error) {
      showStatus('Fehler: ' + data.error, false);
      return;
    }

    if (data.found) {
      document.getElementById('productName').textContent = data.name;
      const pic = document.getElementById('productPic');
      if (data.picture_file_name) {
        pic.src = 'api/product-picture/' + encodeURIComponent(data.picture_file_name);
        pic.style.display = 'block';
      } else {
        pic.style.display = 'none';
      }
      showStatus('Bekannt - aktueller Bestand: ' + (data.stock_amount ?? '0'), true);
      showStep('step-action');
    } else {
      document.getElementById('unknownLabel').textContent = 'Unbekannter Barcode: ' + pendingBarcode;
      showStatus('Unbekannt - bitte Produktfoto aufnehmen', false);
      startPhoto2();
    }
  } catch (err) {
    showStatus('Netzwerk-Fehler beim Abgleich: ' + err, false);
  }
}

async function book(action) {
  const amount = document.getElementById('amount').value || 1;
  showStatus('Buche...', true);
  try {
    const res = await fetch('api/book', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ barcode: pendingBarcode, amount: amount, action: action })
    });
    const data = await res.json();
    if (data.status === 'ok') {
      showStatus('Gebucht: ' + data.barcode, true);
      setTimeout(startScanning, 800);
    } else {
      showStatus('Fehler: ' + data.message, false);
    }
  } catch (err) {
    showStatus('Netzwerk-Fehler beim Buchen: ' + err, false);
  }
}

let photo2Stream = null;

function startPhoto2() {
  showStep('step-photo2');
  const video = document.getElementById('livestream2');
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(stream => {
    photo2Stream = stream;
    video.srcObject = stream;
    video.play();
  }).catch(err => showStatus('Kamera-Fehler: ' + err, false));
}

document.getElementById('btnCapture').onclick = async () => {
  const video = document.getElementById('livestream2');
  const canvas = document.getElementById('captureCanvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  if (photo2Stream) photo2Stream.getTracks().forEach(t => t.stop());

  canvas.toBlob(async (blob) => {
    const fd = new FormData();
    fd.append('photo', blob, 'product.jpg');
    fd.append('barcode', pendingBarcode);

    showStatus('Lege Produkt an...', true);
    try {
      const res = await fetch('api/create-unknown', { method: 'POST', body: fd });
      const data = await res.json();

      if (data.status === 'ok') {
        showStatus('Produkt angelegt (id ' + data.product_id + ') - jetzt Menge eingeben', true);
        document.getElementById('productName').textContent = '(neu angelegt, Name folgt spaeter)';
        document.getElementById('productPic').style.display = 'none';
        showStep('step-action');
      } else {
        showStatus('Fehler: ' + data.message, false);
      }
    } catch (err) {
      showStatus('Netzwerk-Fehler beim Anlegen: ' + err, false);
    }
  }, 'image/jpeg', 0.9);
};

document.getElementById('btnAdd').onclick = () => book('add');
document.getElementById('btnConsume').onclick = () => book('consume');
document.getElementById('btnCancel').onclick = () => startScanning();

startScanning();
</script>
</body>
</html>
