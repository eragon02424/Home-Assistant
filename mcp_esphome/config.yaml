name: "MCP ESPHome"
description: "Vermittler-Service zwischen Claude und ESPHome-Geräten via native API."
version: "0.4.1"
slug: "mcp_esphome"
init: false
arch:
  - aarch64
  - amd64
startup: services
boot: auto
host_network: true
map:
  - config:rw
  - addon_config:rw
options:
  esphome_dashboard_url: "http://localhost:6052"
  bearer_token: ""
  port: 8090
  log_retention_hours: 24
  heartbeat_retention_days: 30
  keepalive_interval: 10
  keepalive_retries: 2
  keepalive_ping_timeout_ms: 100
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
schema:
  esphome_dashboard_url: str
  bearer_token: str
  port: int
  log_retention_hours: int
  heartbeat_retention_days: int
  keepalive_interval: int
  keepalive_retries: int
  keepalive_ping_timeout_ms: int
  mqtt_host: str
  mqtt_port: int
