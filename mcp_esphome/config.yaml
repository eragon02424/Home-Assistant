name: "MCP ESPHome"
description: "Vermittler-Service zwischen Claude und ESPHome-Geräten via native API. Compile, Flash, Logs, Device-Discovery, Online/Offline-Heartbeat-Historie."
version: "0.1.4"
slug: "mcp_esphome"
init: false
arch:
  - aarch64
  - amd64
startup: services
boot: auto
host_network: true
map:
  - config:rw
  - addon_config:rw
options:
  esphome_dashboard_url: "http://localhost:6052"
  bearer_token: ""
  port: 8090
  log_retention_hours: 24
  heartbeat_retention_days: 30
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
schema:
  esphome_dashboard_url: str
  bearer_token: str
  port: int
  log_retention_hours: int
  heartbeat_retention_days: int
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str
  mqtt_password: str
