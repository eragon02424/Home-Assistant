name: "MCP ESPHome"
description: "Vermittler-Service zwischen Claude und ESPHome-Geräten via native API."
version: "0.17.1"
slug: "mcp_esphome"
init: false
arch:
  - aarch64
  - amd64
startup: services
boot: auto
host_network: true
hassio_api: true
map:
  - config:rw
  - addon_config:rw
options:
  esphome_dashboard_url: "http://localhost:6052"
  bearer_token: ""
  port: 8090
  heartbeat_retention_days: 30
  keepalive_interval: 10
  keepalive_retries: 5
  keepalive_ping_timeout_ms: 500
  keepalive_max_backoff_seconds: 21600
  log_retention_days: 10
  timezone: ""
schema:
  esphome_dashboard_url: str
  bearer_token: str
  port: int
  heartbeat_retention_days: int
  keepalive_interval: int
  keepalive_retries: int
  keepalive_ping_timeout_ms: int
  keepalive_max_backoff_seconds: int
  log_retention_days: int
  timezone: str
