name: "Grocy"
description: "Grocy - ERP beyond your fridge. Groceries & household management."
version: "1.0.1"
slug: "grocy_linuxserver"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
startup: services
boot: auto
ports:
  80/tcp: 9283
ports_description:
  80/tcp: "Grocy Web UI & API"
ingress: true
ingress_port: 80
ingress_stream: false
map:
  - type: config
    path: /config
    read_only: false
options:
  culture: "de"
schema:
  culture: str
