name: "MCP Shell"
description: "MCP Server for executing shell commands on the Home Assistant host"
version: "2.1.0"
slug: "mcp_shell"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
host_network: true
ports:
  8767/tcp: 8767
options: {}
schema: {}
map:
  - type: config
    path: /config
    read_only: false
full_access: true
