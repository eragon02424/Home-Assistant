name: "OneDrive SyncServer"
description: "Synchronisiert Ordner zwischen Home Assistant und Microsoft OneDrive. OneDrive ist immer Master. Pro-Ordner Filter, Vererbung und automatisches lokales Loeschen nach Zeit."
version: "1.0.8"
slug: "onedrive_syncserver"
init: false
arch:
  - amd64
  - aarch64
startup: services
boot: auto
ingress: true
ingress_port: 8765
host_network: false
ports:
  8766/tcp: 8766
ports_description:
  8766/tcp: "Auth-Seite (nur fuer einmalige Microsoft Anmeldung)"
options:
  sync_interval: 300
schema:
  sync_interval: int
map:
  - type: share
    path: /share
    read_only: false
panel_icon: mdi:microsoft-onedrive
panel_title: OneDrive Sync
