name: "OneDrive SyncServer"
description: "Synchronisiert Ordner zwischen Home Assistant und Microsoft OneDrive. OneDrive ist immer Master. Pro-Ordner Filter, Vererbung und automatisches lokales Loeschen nach Zeit."
version: "1.9.0"
slug: "onedrive_syncserver"
init: false
arch:
  - amd64
  - aarch64
startup: services
boot: auto
ingress: true
ingress_port: 8772
host_network: true
options:
  sync_interval: 300
schema:
  sync_interval: int
map:
  - type: share
    path: /share
    read_only: false
panel_icon: mdi:microsoft-onedrive
panel_title: OneDrive Sync
