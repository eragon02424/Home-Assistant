name: "MCP GitHub"
description: "GitHub MCP Server with binary file support. Combines the official GitHub MCP server with custom push_file_binary and get_file_binary tools."
version: "2.0.0"
slug: "mcp_github"
init: false
arch:
  - amd64
startup: services
boot: auto
ports:
  8766/tcp: 8766
map:
  - config:rw
options:
  github_token: ""
schema:
  github_token: str
