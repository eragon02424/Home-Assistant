name: "MCP Serial HomeAssistant"
description: "Persistent serial port listener for ESP32-S2 (USB-CDC) as MCP server via stdio proxy"
version: "1.0.0"
slug: "mcp_serial_homeassistant"
url: "https://github.com/eragon02424/Home-Assistant"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
full_access: true
map:
  - type: config
    path: /config
    read_only: false
options:
  baud_rate: 115200
  ring_buffer_lines: 300
  log_retention_hours: 24
  log_max_size_mb: 20
schema:
  baud_rate: int
  ring_buffer_lines: int
  log_retention_hours: int
  log_max_size_mb: int
